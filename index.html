      <header class="topbar">

        <p class="tagline">Simple local notes for clear thinking.</p>

        <div class="topbar-actions">
          <a class="download-button" href="mailto:hello@mail.lophos.space?subject=Lophos%20Notes%20Windows%20beta">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="download-icon">
              <path
                d="M21 15V16.2C21 17.8802 21 18.7202 20.673 19.362C20.3854 19.9265 19.9265 20.3854 19.362 20.673C18.7202 21 17.8802 21 16.2 21H7.8C6.11984 21 5.27976 21 4.63803 20.673C4.07354 20.3854 3.6146 19.9265 3.32698 19.362C3 18.7202 3 17.8802 3 16.2V15M17 10L12 15M12 15L7 10M12 15V3"

                stroke-linejoin="round"
              />

      <main class="hero">
        <div class="carousel" aria-label="Lophos Notes screenshots carousel" data-carousel>
          <div class="carousel-stage" role="region" aria-live="polite">

              <img src="/Print01.png" alt="Lophos Notes preview 1" width="2222" height="1504" fetchpriority="high" />
            </figure>
            <figure class="carousel-figure" data-slide aria-hidden="true">
              <img src="/Print02.png" alt="Lophos Notes preview 2" width="2222" height="1504" loading="lazy" />
            </figure>
            <figure class="carousel-figure" data-slide aria-hidden="true">
              <img src="/Print03.png" alt="Lophos Notes preview 3" width="2222" height="1504" loading="lazy" />
            </figure>
            <figure class="carousel-figure" data-slide aria-hidden="true">
              <img src="/Print04.png" alt="Lophos Notes preview 4" width="2222" height="1504" loading="lazy" />
            </figure>
          </div>

          <div class="carousel-dots" aria-label="Select a screenshot">
            <button class="carousel-dot is-active" type="button" aria-label="Go to screenshot 1" aria-pressed="true"></button>
            <button class="carousel-dot" type="button" aria-label="Go to screenshot 2" aria-pressed="false"></button>
            <button class="carousel-dot" type="button" aria-label="Go to screenshot 3" aria-pressed="false"></button>
            <button class="carousel-dot" type="button" aria-label="Go to screenshot 4" aria-pressed="false"></button>
